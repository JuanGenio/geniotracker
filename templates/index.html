<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GenioTracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b1120;color:#e0e6ed}
.header{background:linear-gradient(135deg,#1a237e,#01579b);padding:14px;text-align:center}
.header h1{font-size:18px}
.header .sub{font-size:12px;opacity:.7}
#map{width:100%;height:55vh;min-height:280px}
.panel{padding:12px 16px;background:#111827}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;background:#1f2937;cursor:pointer;font-size:13px;font-weight:600;border:2px solid transparent;color:#9ca3af}
.tab.active{background:#1e3a5f;border-color:#3b82f6;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#1f2937;border-radius:10px;padding:10px}
.card .lbl{font-size:10px;text-transform:uppercase;color:#6b7280;margin-bottom:2px}
.card .val{font-size:15px;font-weight:700;font-family:'Courier New',monospace}
.card .val.ok{color:#22c55e}
.card .val.wait{color:#f59e0b}
.coords{margin-top:8px;padding:10px;background:#0f172a;border-radius:8px;font-family:'Courier New',monospace;font-size:13px;border:1px solid #1e293b;word-break:break-all}
.coords .lbl{color:#6b7280;font-size:10px;text-transform:uppercase}
.ruta{margin-top:10px;padding:10px;background:#1f2937;border-radius:10px}
.ruta .line{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.ruta .code{font-weight:700;font-size:17px;color:#60a5fa}
.ruta .name{font-size:11px;color:#9ca3af}
.btn-refresh{display:block;width:100%;margin-top:10px;padding:12px;border-radius:10px;background:#2563eb;color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer}
.btn-refresh:active{background:#1d4ed8}
.estado{margin-top:10px;padding:10px;border-radius:10px;font-size:13px;text-align:center}
.estado.wait{background:#78350f;color:#fcd34d}
.estado.ok{background:#064e3b;color:#6ee7b7}
.estado.ground{background:#1f2937;color:#9ca3af}
.ult-act{text-align:center;font-size:11px;color:#4b5563;margin-top:6px}
</style>
</head>
<body>

<div class="header">
  <h1>🛩️ GenioTracker ✈️ — Lima 🇵🇪</h1>
  <div class="sub">Camila · 6-7 jul 2026</div>
</div>
<div id="map"></div>
<div class="panel">

<div class="tabs">
  <div class="tab active" data-f="IB418" onclick="cambiar('IB418')">IB 418 <span style="font-size:10px;opacity:.6">BCN→MAD</span></div>
  <div class="tab" data-f="IB123" onclick="cambiar('IB123')">IB 123 <span style="font-size:10px;opacity:.6">MAD→LIM</span></div>
</div>

<div class="grid">
  <div class="card"><div class="lbl">Latitud</div><div class="val wait" id="lat">--</div></div>
  <div class="card"><div class="lbl">Longitud</div><div class="val wait" id="lon">--</div></div>
  <div class="card"><div class="lbl">Altitud</div><div class="val wait" id="alt">--</div></div>
  <div class="card"><div class="lbl">Velocidad</div><div class="val wait" id="spd">--</div></div>
</div>

<div class="coords"><div class="lbl">📍 Coordenadas GPS</div><div id="txt-coords">Pulsa "Buscar avión"</div></div>

<div class="ruta">
  <div class="line">
    <div><div class="code" id="dep-c">BCN</div><div class="name" id="dep-n">Barcelona</div><div id="dep-h" style="font-size:11px;color:#6b7280">18:15</div></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="color:#4b5563">────</span><span id="arrow">✈️</span><span style="color:#4b5563">────</span></div>
    <div style="text-align:right"><div class="code" id="arr-c">MAD</div><div class="name" id="arr-n">Madrid</div><div id="arr-h" style="font-size:11px;color:#6b7280">19:40</div></div>
  </div>
</div>

<button class="btn-refresh" onclick="buscar()">🔍 Buscar avión</button>

<div class="estado wait" id="estado">Pulsa "Buscar avión" para localizarlo</div>
<div class="ult-act" id="ult-act"></div>
</div>

<script>
const VUELOS = {{ flights | tojson }};
const RUTAS = {
  IB418: [[41.2971,2.0785],[41.5,1.5],[41.0,0],[40.5,-1],[40.4722,-3.5634]],
  IB123: [[40.4722,-3.5634],[40,-5],[39,-10],[37,-15],[34,-20],[30,-25],[25,-30],[20,-35],[15,-40],[10,-45],[5,-50],[0,-55],[-5,-60],[-8,-65],[-10,-70],[-12.0219,-77.1143]]
};
const AERO = { BCN:[41.2971,2.0785], MAD:[40.4722,-3.5634], LIM:[-12.0219,-77.1143] };

let mapa = L.map('map',{center:[40.5,-3.5],zoom:5,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mapa);

const icoAvion = L.divIcon({html:'<div style="font-size:22px">✈️</div>',iconSize:[24,24],iconAnchor:[12,12],className:''});
let marcaAvion=null, lineaRuta=null, marcasAero={}, actual='IB418';

function pintaAero(v) {
  Object.values(marcasAero).forEach(m=>mapa.removeLayer(m)); marcasAero={};
  if(!v) return;
  [v.dep,v.arr].forEach((a,i)=>{
    let c=L.divIcon({html:`<div style="background:${i===0?'#22c55e':'#ef4444'};width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,iconSize:[10,10],iconAnchor:[5,5],className:''});
    let m=L.marker([a.lat,a.lon],{icon:c}).addTo(mapa);
    m.bindPopup(`<b>${a.code}</b><br>${a.name}`);
    marcasAero[a.code]=m;
  });
}
function pintaRuta(v) {
  if(lineaRuta) mapa.removeLayer(lineaRuta);
  let c=RUTAS[v]; if(!c) return;
  lineaRuta=L.polyline(c,{color:'#3b82f6',weight:2,opacity:.5,dashArray:'6,10'}).addTo(mapa);
  mapa.fitBounds(lineaRuta.getBounds(),{padding:[50,50],maxZoom:8});
}

function cambiar(v) {
  actual=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.f===v));
  let f=VUELOS[v];
  document.getElementById('dep-c').textContent=f.dep.code;
  document.getElementById('dep-n').textContent=f.dep.name;
  document.getElementById('dep-h').textContent=f.dep_time;
  document.getElementById('arr-c').textContent=f.arr.code;
  document.getElementById('arr-n').textContent=f.arr.name;
  document.getElementById('arr-h').textContent=f.arr_time;
  document.getElementById('arrow').textContent=v==='IB418'?'✈️':'🛩️';
  pintaAero(f); pintaRuta(v);
  if(marcaAvion){mapa.removeLayer(marcaAvion);marcaAvion=null}
  document.getElementById('lat').textContent='--'; document.getElementById('lat').className='val wait';
  document.getElementById('lon').textContent='--'; document.getElementById('lon').className='val wait';
  document.getElementById('alt').textContent='--'; document.getElementById('alt').className='val wait';
  document.getElementById('spd').textContent='--'; document.getElementById('spd').className='val wait';
  document.getElementById('txt-coords').textContent='Pulsa "Buscar avión"';
  document.getElementById('estado').textContent='Pulsa "Buscar avión" para localizarlo';
  document.getElementById('estado').className='estado wait';
  document.getElementById('ult-act').textContent='';
  buscar();
}

function buscar() {
  let btn=document.querySelector('.btn-refresh');
  btn.textContent='⏳ Buscando...'; btn.disabled=true;
  document.getElementById('estado').textContent='⏳ Consultando radar...';
  document.getElementById('estado').className='estado wait';

  fetch('/api/track?flight='+actual)
    .then(r=>r.json())
    .then(d=>{
      btn.textContent='🔍 Buscar avión'; btn.disabled=false;
      let f=VUELOS[actual];
      if(d.found && d.lat!==null) {
        let lat=d.lat, lon=d.lon, alt=d.altitude_m, spd=d.velocity_kmh, dir=d.direction, gr=d.on_ground;
        document.getElementById('lat').textContent=lat.toFixed(6); document.getElementById('lat').className='val ok';
        document.getElementById('lon').textContent=lon.toFixed(6); document.getElementById('lon').className='val ok';
        document.getElementById('alt').textContent=alt!==null?(alt/1000).toFixed(1)+' km ('+(alt*3.28084).toFixed(0)+' ft)':'En tierra';
        document.getElementById('alt').className='val ok';
        document.getElementById('spd').textContent=spd!==null?spd.toFixed(0)+' km/h':'0 km/h';
        document.getElementById('spd').className='val ok';
        let lDir=lat>=0?'N':'S', loDir=lon>=0?'E':'W';
        document.getElementById('txt-coords').textContent=Math.abs(lat).toFixed(6)+'° '+lDir+', '+Math.abs(lon).toFixed(6)+'° '+loDir;
        if(marcaAvion){marcaAvion.setLatLng([lat,lon])} else {marcaAvion=L.marker([lat,lon],{icon:icoAvion,zIndexOffset:1000}).addTo(mapa);marcaAvion.bindPopup(`<b>${actual}</b><br>${lat.toFixed(4)}, ${lon.toFixed(4)}`)}
        let e=document.getElementById('estado');
        if(gr){e.className='estado ground';e.textContent='🛬 En tierra'}else{e.className='estado ok';e.textContent='✈️ En vuelo'}
      } else {
        document.getElementById('lat').textContent='--'; document.getElementById('lat').className='val wait';
        document.getElementById('lon').textContent='--'; document.getElementById('lon').className='val wait';
        document.getElementById('alt').textContent='--'; document.getElementById('alt').className='val wait';
        document.getElementById('spd').textContent='--'; document.getElementById('spd').className='val wait';
        document.getElementById('txt-coords').textContent=d.message||'No se encontró el avión';
        let e=document.getElementById('estado');
        e.className='estado wait';
        e.textContent='⏳ '+d.message;
      }
      document.getElementById('ult-act').textContent='🕐 ' + new Date().toLocaleTimeString('es-ES');
    })
    .catch(e=>{
      btn.textContent='🔍 Buscar avión'; btn.disabled=false;
      document.getElementById('estado').textContent='❌ Error de conexión';
    });
}

pintaAero(VUELOS.IB418); pintaRuta('IB418');
</script>
</body>
</html>
